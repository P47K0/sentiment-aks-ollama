apiVersion: v1
kind: ConfigMap
metadata:
  name: sentiment-config
data:
  OLLAMA_URL: "http://ollama-service:11434"
  MODEL: "phi3:mini"
  ADAPTER_URL: "http://llm-adapter:5000/sentiment"
  PROMPT_TEMPLATE: |
    You are a sentiment analysis model.
    Analyze the sentiment of the text below and respond with **ONLY** valid JSON.
    No explanations, no extra text, no markdown, no apologies.

    Text: {text}

    Respond with exactly this JSON format and nothing else:
    {{
      "sentiment": "POSITIVE" or "NEGATIVE" or "NEUTRAL",
      "positive": number between 0.0 and 1.0,
      "neutral": number between 0.0 and 1.0,
      "negative": number between 0.0 and 1.0
    }}