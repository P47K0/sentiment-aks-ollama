apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentiment-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: traefik
  rules:
  - host: sentiment-demo.local     # Change this to your domain or use a fake one for demo
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sentiment-api
            port:
              number: 5000