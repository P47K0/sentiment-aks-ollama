# create-pipeline.yaml
trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  location: 'centralindia'

stages:

- stage: Bootstrap
  displayName: '1. Bootstrap Terraform Backend'
  jobs:
  - job: Bootstrap
    steps:
    - template: templates/install-terraform.yaml
    - task: AzureCLI@2
      displayName: 'Terraform Init - Bootstrap'
      inputs:
        azureSubscription: 'VSPro-Azure-Connection'
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd terraform-bootstrap
          terraform init

    - task: AzureCLI@2
      displayName: 'Import Storage Account'
      inputs:
        azureSubscription: 'VSPro-Azure-Connection'
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd terraform-bootstrap
          # Try to import, but continue even if it fails (already imported)
          terraform import azurerm_storage_account.tfstate /subscriptions/$(SubscriptionId)/resourceGroups/$(ResourceGroupName)/providers/Microsoft.Storage/storageAccounts/$(StorageAccountName) 2>&1 | Out-Null
          Write-Host "Import attempt completed (safe to ignore if already imported)."

    - task: AzureCLI@2
      displayName: 'Terraform Apply - Backend Storage'
      inputs:
        azureSubscription: 'VSPro-Azure-Connection'
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd terraform-bootstrap
          terraform apply -auto-approve -var="resource_group_name=$(ResourceGroupName)" -var="location=$(location)" -var="storage_account_name=$(StorageAccountName)"
- stage: Infrastructure
  displayName: '2. Create AKS Infrastructure'
  dependsOn: Bootstrap
  jobs:
  - job: TerraformAKS
    steps:
    - template: templates/install-terraform.yaml
    - task: AzureCLI@2
      displayName: 'Terraform Init - Main'
      inputs:
        azureSubscription: 'VSPro-Azure-Connection'
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd terraform-cicd
          terraform init

    - task: AzureCLI@2
      displayName: 'Terraform Apply - AKS + Nodepool + IP'
      inputs:
        azureSubscription: 'VSPro-Azure-Connection'
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd terraform-cicd
          terraform apply -auto-approve -var="resource_group_name=$(ResourceGroupName)" -var="location=$(location)" -var="user_nodepool_enabled=true"