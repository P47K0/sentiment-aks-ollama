# create-pipeline.yaml

# Pipeline variables/secrets to set:
# CloudflareApiToken → Secret (with DNS:Edit + Workers KV:Write permissions)
# CloudflareZoneId → Your domain's Zone ID
# CloudflareAccountId → Your Cloudflare Account ID
# KV_Namespace_ID → ID of your DEMO_BACKEND KV namespace
# AzureDnsRecordId → The DNS Record ID of the azure A record (you need to get this once)

trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  location: 'centralindia'

stages:

- stage: Bootstrap
  displayName: '1. Bootstrap Terraform Backend'
  jobs:
  - job: Bootstrap
    steps:
    - template: templates/install-terraform.yaml
    - task: AzureCLI@2
      displayName: 'Terraform Init - Bootstrap'
      inputs:
        azureSubscription: 'VSPro-Azure-Connection'
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd terraform-bootstrap
          terraform init -backend-config="resource_group_name=$(ResourceGroupName)" -backend-config="storage_account_name=$(StorageAccountName)" -backend-config="container_name=tfstate" -backend-config="key=bootstrap.tfstate"

    - task: AzureCLI@2
      displayName: 'Create Backend Storage if not exists'
      inputs:
        azureSubscription: 'VSPro-Azure-Connection'
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd terraform-bootstrap
          
          # Check if storage account already exists
          $accountExists = az storage account show --name $(StorageAccountName) --resource-group $(ResourceGroupName) --query "name" -o tsv 2>$null
          
          if ($accountExists) {
            Write-Host "Storage account '$(StorageAccountName)' already exists. Skipping creation."
          } else {
            Write-Host "Storage account does not exist. Creating it..."
            terraform apply -auto-approve -var="resource_group_name=$(ResourceGroupName)" -var="location=$(location)" -var="storage_account_name=$(StorageAccountName)"
          }

- stage: Infrastructure
  displayName: '2. Create AKS Infrastructure'
  dependsOn: Bootstrap
  jobs:
  - job: TerraformAKS
    steps:
    - template: templates/install-terraform.yaml
    - task: AzureCLI@2
      displayName: 'Terraform Init - Main'
      inputs:
        azureSubscription: 'VSPro-Azure-Connection'
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd terraform-cicd
          terraform init -backend-config="resource_group_name=$(ResourceGroupName)" -backend-config="storage_account_name=$(StorageAccountName)" -backend-config="container_name=tfstate" -backend-config="key=terraform.tfstate"

    - task: AzureCLI@2
      displayName: 'Terraform Apply - AKS + Nodepool + IP'
      inputs:
        azureSubscription: 'VSPro-Azure-Connection'
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
          cd terraform-cicd
          terraform apply -auto-approve -var="resource_group_name=$(ResourceGroupName)" -var="location=$(location)" -var="user_nodepool_enabled=true" -var="storage_account_name=$(StorageAccountName)"

    - task: AzureCLI@2
      displayName: 'Save Traefik Public IP to file'
      inputs:
        azureSubscription: 'VSPro-Azure-Connection'
        scriptType: 'pscore'
        scriptLocation: 'inlineScript'
        inlineScript: |
            cd terraform-cicd
            $clusterName = terraform output -raw aks_cluster_name
            $clusterName | Out-File -FilePath "$(Build.ArtifactStagingDirectory)/aks-cluster-name.txt" -Encoding utf8
            Write-Host "AKS cluster name: $clusterName"            
            $ip = terraform output -raw aks_public_ip
            $ip | Out-File -FilePath "$(Build.ArtifactStagingDirectory)/aks-public-ip.txt" -Encoding utf8
            Write-Host "Saved AKS Public IP: $ip"
            $pipName = terraform output -raw aks_pip_name
            $pipName | Out-File -FilePath "$(Build.ArtifactStagingDirectory)/aks-pip-name.txt" -Encoding utf8
            Write-Host "Saved AKS PIP Name: $pipName"
            $pipResourceGroupName = terraform output -raw aks_pip_rg_name
            $pipResourceGroupName | Out-File -FilePath "$(Build.ArtifactStagingDirectory)/aks-pip-resource-group-name.txt" -Encoding utf8
            Write-Host "Saved AKS PIP Resource Group Name: $pipResourceGroupName"

    - task: PublishPipelineArtifact@1
      displayName: 'Publish IP Artifact'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'cluster-data'
        publishLocation: 'pipeline'

    - task: AzureCLI@2
      displayName: 'Get AKS Load Balancer Public IP (Traefik)'
      inputs:
        azureSubscription: 'Your-Subscription-Connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Waiting for Traefik Load Balancer IP to be assigned..."

          for i in {1..40}; do
            LB_IP=$(kubectl get svc traefik -n ingress -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")

            if [[ -n "$LB_IP" && "$LB_IP" != "<pending>" ]]; then
              echo "Load Balancer IP found: $LB_IP"
              echo "##vso[task.setvariable variable=AKS_LB_PUBLIC_IP]$LB_IP"
              break
            fi

            echo "Still pending... waiting 15 seconds ($i/40)"
            sleep 15
          done

          if [[ -z "$LB_IP" ]]; then
            echo "Failed to get Load Balancer IP after timeout"
            exit 1
          fi

    - task: PowerShell@2
      displayName: 'Update azure.demourlisd.one DNS + Cloudflare KV'
      inputs:
        targetType: 'inline'
        script: |
          $headers = @{
            "Authorization" = "Bearer $(CloudflareApiToken)"
            "Content-Type"  = "application/json"
          }

          # === 1. Update DNS Record for azure.demourlisd.one ===
          $dnsBody = @{
            type    = "A"
            name    = "azure"
            content = "$(AKS_LB_PUBLIC_IP)"
            ttl     = 60
            proxied = $true
          } | ConvertTo-Json

          Write-Host "Updating DNS record azure.demourlisd.one -> $(AKS_LB_PUBLIC_IP)"

          Invoke-RestMethod -Method PUT `
            -Uri "https://api.cloudflare.com/client/v4/zones/$(CloudflareZoneId)/dns_records/$(AzureDnsRecordId)" `
            -Headers $headers `
            -Body $dnsBody

          Write-Host "DNS record updated successfully"

          # === 2. Update Cloudflare KV with the backend URL ===
          $kvHeaders = @{
            "Authorization" = "Bearer $(CloudflareApiToken)"
            "Content-Type"  = "text/plain"
          }

          $backendUrl = "https://azure.demourlisd.one"

          Write-Host "Updating KV: backend_url = $backendUrl"

          Invoke-RestMethod -Method PUT `
            -Uri "https://api.cloudflare.com/client/v4/accounts/$(CloudflareAccountId)/storage/kv/namespaces/$(KV_Namespace_ID)/values/backend_url" `
            -Headers $kvHeaders `
            -Body $backendUrl

          Write-Host "KV updated successfully. Domain now points to new AKS backend."