trigger:
  - none

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerHubUsername: 'p47r1ck75'
  imageTag: '$(Build.BuildId)'
  
  environment: '$(environmentName)'
  namespace: '$(environment)'
  model: 'phi3:mini'

stages:
- stage: Test
  displayName: '1. Run Tests'
  jobs:
  - job: Test
    displayName: 'Run Tests'
    steps:

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m pip install -r requirements-dev.txt
        python -m pytest tests --junitxml=test-results.xml --cov=. --cov-report=xml:coverage.xml
      workingDirectory: sentiment-api
      displayName: Run sentiment-api tests

    - task: PublishTestResults@2
      condition: always()
      inputs:
        testResultsFormat: JUnit
        testResultsFiles: 'sentiment-api/test-results.xml'
        testRunTitle: 'sentiment-api tests'

    - task: PublishCodeCoverageResults@2
      inputs:
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/sentiment-api/coverage.xml'

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m pip install -r requirements-dev.txt
        python -m pytest tests --junitxml=test-results.xml --cov=. --cov-report=xml:coverage.xml
      workingDirectory: llm-adapter
      displayName: Run llm-adapter tests

    - task: PublishTestResults@2
      condition: always()
      inputs:
        testResultsFormat: JUnit
        testResultsFiles: 'llm-adapter/test-results.xml'
        testRunTitle: 'llm-adapter tests'

    - task: PublishCodeCoverageResults@2
      inputs:
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/llm-adapter/coverage.xml'

- stage: Build
  displayName: '2. Build & Push Docker Images'
  jobs:
  - job: DetectChanges
    steps:
    - checkout: self
      fetchDepth: 2  # Gets HEAD + HEAD~1
    - pwsh: |
        $changes = git diff HEAD~1 HEAD --name-only
        Write-Host "Feature branch changes: $changes"
        
        $llmChanged = ($changes -match "llm-adapter/").Count -gt 0
        $apiChanged = ($changes -match "sentiment-api/").Count -gt 0
        
        Write-Host "LLM changed: $llmChanged | API changed: $apiChanged"
        
        # Global variables (same-job access)
        echo "##vso[task.setvariable variable=llmAdapterChanged;isOutput=true]$llmChanged"
        echo "##vso[task.setvariable variable=sentimentApiChanged;isOutput=true]$apiChanged"
      name: detect
      displayName: 'Detect changes'

  - job: ResolveFallbackTags
    displayName: Resolve DockerHub fallback tags
    dependsOn: DetectChanges
    steps:
    - bash: |
        set -euo pipefail
        
        # Get newest non-latest tag for each service
        SENTIMENT_API_FALLBACK=$(curl -s "https://registry.hub.docker.com/v2/repositories/${DOCKERHUB_USER}/sentiment-api/tags/?page_size=50" \
          | jq -r '.results[] | select(.name != "latest") | .name' \
          | sort -V | tail -1)

        LLM_ADAPTER_FALLBACK=$(curl -s "https://registry.hub.docker.com/v2/repositories/${DOCKERHUB_USER}/llm-adapter/tags/?page_size=50" \
          | jq -r '.results[] | select(.name != "latest") | .name' \
          | sort -V | tail -1)

        echo "Sentiment API fallback: $SENTIMENT_API_FALLBACK"
        echo "LLM Adapter fallback: $LLM_ADAPTER_FALLBACK"

        echo "##vso[task.setvariable variable=sentimentApiFallbackTag;isOutput=true]$SENTIMENT_API_FALLBACK"
        echo "##vso[task.setvariable variable=llmAdapterFallbackTag;isOutput=true]$LLM_ADAPTER_FALLBACK"
      name: setFallbackTags
      displayName: Get newest DockerHub tags
      env:
        DOCKERHUB_USER: $(dockerHubUsername)

  - job: BuildLlmAdapter
    dependsOn:
    - DetectChanges
    - ResolveFallbackTags
    condition: and(succeeded(), eq(dependencies.DetectChanges.outputs['detect.llmAdapterChanged'], 'True'))
    variables:
      imageTag: $(Build.BuildId)
    steps:
    - checkout: self
    - script: |
        echo $(dockerHubPassword) | docker login -u $(dockerHubUsername) --password-stdin
      displayName: '🔑 Docker Login to Docker Hub'
    - bash: |
        set -euo pipefail
        LLM_ADAPTER_TAG="$(Build.BuildId)"
        echo "Using llm-adapter tag: $LLM_ADAPTER_TAG"
        echo "##vso[task.setvariable variable=llmAdapterImageTag;isOutput=true]$LLM_ADAPTER_TAG"
      name: setLlmAdapterTag
      displayName: Set llm-adapter image tag
    - task: Docker@2
      displayName: 'Build & Push llm-adapter'
      inputs:
        command: buildAndPush
        repository: '$(dockerHubUsername)/llm-adapter'
        dockerfile: 'llm-adapter/Dockerfile'
        tags: |
          $(imageTag)
          latest

  - job: BuildApi
    dependsOn:
    - DetectChanges
    - ResolveFallbackTags
    condition: and(succeeded(), eq(dependencies.DetectChanges.outputs['detect.sentimentApiChanged'], 'True'))
    variables:
      imageTag: $(Build.BuildId)
    steps:
    - checkout: self
    - script: |
        echo $(dockerHubPassword) | docker login -u $(dockerHubUsername) --password-stdin
      displayName: '🔑 Docker Login to Docker Hub'
    - bash: |
        set -euo pipefail
        SENTIMENT_API_TAG="$(Build.BuildId)"
        echo "Using sentiment-api tag: $SENTIMENT_API_TAG"
        echo "##vso[task.setvariable variable=sentimentApiImageTag;isOutput=true]$SENTIMENT_API_TAG"
      name: setSentimentApiTag
      displayName: Set sentiment-api image tag  
    - task: Docker@2
      displayName: 'Build & Push sentiment-api'
      inputs:
        command: buildAndPush
        repository: '$(dockerHubUsername)/sentiment-api'
        dockerfile: 'sentiment-api/Dockerfile'
        tags: |
          $(imageTag)
          latest
  - job: ResolveFinalTags
    displayName: Resolve final image tags
    dependsOn:
    - DetectChanges
    - ResolveFallbackTags
    - BuildApi
    - BuildLlmAdapter
    condition: always()
    variables:
      sentimentApiChanged: $[ dependencies.DetectChanges.outputs['detect.sentimentApiChanged'] ]
      llmAdapterChanged: $[ dependencies.DetectChanges.outputs['detect.llmAdapterChanged'] ]
      sentimentApiFallbackTag: $[ dependencies.ResolveFallbackTags.outputs['setFallbackTags.sentimentApiFallbackTag'] ]
      llmAdapterFallbackTag: $[ dependencies.ResolveFallbackTags.outputs['setFallbackTags.llmAdapterFallbackTag'] ]
      builtSentimentApiTag: $[ dependencies.BuildApi.outputs['setSentimentApiTag.sentimentApiImageTag'] ]
      builtLlmAdapterTag: $[ dependencies.BuildLlmAdapter.outputs['setLlmAdapterTag.llmAdapterImageTag'] ]
    steps:
    - bash: |
        set -euo pipefail

        if [ "$(sentimentApiChanged)" = "True" ] && [ -n "$(builtSentimentApiTag)" ]; then
          FINAL_SENTIMENT_API_TAG="$(builtSentimentApiTag)"
        else
          FINAL_SENTIMENT_API_TAG="$(sentimentApiFallbackTag)"
        fi

        if [ "$(llmAdapterChanged)" = "True" ] && [ -n "$(builtLlmAdapterTag)" ]; then
          FINAL_LLM_ADAPTER_TAG="$(builtLlmAdapterTag)"
        else
          FINAL_LLM_ADAPTER_TAG="$(llmAdapterFallbackTag)"
        fi

        echo "Final sentiment-api tag: $FINAL_SENTIMENT_API_TAG"
        echo "Final llm-adapter tag: $FINAL_LLM_ADAPTER_TAG"

        echo "##vso[task.setvariable variable=finalSentimentApiTag;isOutput=true]$FINAL_SENTIMENT_API_TAG"
        echo "##vso[task.setvariable variable=finalLlmAdapterTag;isOutput=true]$FINAL_LLM_ADAPTER_TAG"
      name: setFinalTags
      displayName: Publish final tags

- stage: CertManager
  displayName: 'Deploy Cert Manager'
  condition: eq(variables['DeployTraefikAndCertManager'], 'true')
  jobs:
  - deployment: DeployCertManager
    displayName: 'Deploy Cert Manager'
    environment: 'cert-manager'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            clean: true         
          - script: |
              helm repo add jetstack https://charts.jetstack.io
              helm repo update
            displayName: 'Add/Update Cert Manager Repo'

          - task: HelmDeploy@1
            displayName: 'Deploy Cert Manager'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceConnection: 'AKS-VSPro-Connection'
              namespace: 'cert-manager'
              command: 'upgrade'
              chartType: 'Name'
              chartName: 'jetstack/cert-manager'
              releaseName: 'cert-manager'
              install: true              
              arguments: '--create-namespace --set crds.enabled=true'

          - task: KubernetesManifest@1
            displayName: 'Deploy cluster issuer'
            inputs:
              action: 'deploy'
              kubernetesServiceConnection: 'AKS-VSPro-Connection'
              manifests: |                
                k8s/cluster-issuer.yaml

          - script: |
              kubectl create secret generic letsencrypt-prod-account-key \
                --namespace cert-manager \
                --dry-run=client -o yaml | kubectl apply -f -
            displayName: 'Create Lets Encrypt Account Key Secret'

- stage: Traefik
  displayName: 'Deploy Traefik'
  condition: eq(variables['DeployTraefikAndCertManager'], 'true')
  jobs:
  - deployment: DeployTraefik
    displayName: 'Deploy Traefik'
    environment: 'ingress'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            clean: true
          - task: DownloadPipelineArtifact@2
            displayName: 'Download Cluster Artifact'
            inputs:
              buildType: 'specific'
              project: '$(System.TeamProject)'
              pipeline: 'P47K0.sentiment-aks-ollama - Create'
              artifact: 'cluster-data'
              path: '$(Pipeline.Workspace)/cluster-data'

          - task: PowerShell@2
            displayName: 'Read Cluster Data'
            inputs:
              targetType: 'inline'
              script: |
                $aksRgFile = "$(Pipeline.Workspace)/cluster-data/aks-pip-resource-group-name.txt"
                if (Test-Path $aksRgFile) {
                  $aksRg = Get-Content $aksRgFile -Raw
                  $aksRg = $aksRg.Trim()
                  Write-Host "Loaded AKS PIP Resource Group Name: $aksRg"
                  Write-Host "##vso[task.setvariable variable=aksPipResourceGroupName]$aksRg"
                } else {
                  Write-Host "##vso[task.logissue type=error]AKS PIP Resource Group Name file not found!"
                  exit 1
                }
                $pipNameFile = "$(Pipeline.Workspace)/cluster-data/aks-pip-name.txt"
                if (Test-Path $pipNameFile) {
                  $pipName = Get-Content $pipNameFile -Raw
                  $pipName = $pipName.Trim()
                  Write-Host "Loaded AKS PIP Name: $pipName"
                  Write-Host "##vso[task.setvariable variable=aksPipName]$pipName"
                } else {
                  Write-Host "##vso[task.logissue type=error]AKS PIP Name file not found!"
                  exit 1
                }
                $ipFile = "$(Pipeline.Workspace)/cluster-data/aks-public-ip.txt"
                if (Test-Path $ipFile) {
                  $ip = Get-Content $ipFile -Raw
                  $ip = $ip.Trim()
                  Write-Host "Loaded AKS Public IP: $ip"
                  Write-Host "##vso[task.setvariable variable=aksPublicIp]$ip"
                } else {
                  Write-Host "##vso[task.logissue type=error]AKS Public IP file not found!"
                  exit 1
                }

          - script: |
              helm repo add traefik https://traefik.github.io/charts
              helm repo update
            displayName: 'Add/Update Traefik Helm Repo'

          - task: HelmDeploy@1
            displayName: 'Deploy Traefik'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceConnection: 'AKS-VSPro-Connection'
              namespace: 'ingress'
              command: 'upgrade'
              chartType: 'Name'
              chartName: 'traefik/traefik'
              releaseName: 'traefik'
              install: true
              #valueFile: 'k8s/traefik-values.yml'
              #overrideValues: |
              #  service.annotations.service\\.beta\\.kubernetes\\.io/azure-load-balancer-resource-group=$(aksPipResourceGroupName)
              #  service.annotations.service\\.beta\\.kubernetes\\.io/azure-load-balancer-pip-name=$(aksPipName)
              #  service.spec.loadBalancerIP=$(aksPublicIp)
              arguments: '--atomic --create-namespace --set providers.kubernetesCRD.allowCrossNamespace=true'

          - task: KubernetesManifest@1
            displayName: 'Deploy yaml Manifests'
            inputs:
              action: 'deploy'
              kubernetesServiceConnection: 'AKS-VSPro-Connection'
              namespace: 'ingress'
              manifests: |                
                k8s/traefik-middlewares.yaml
                k8s/traefik-sentiment-routes.yaml

- stage: Deploy
  displayName: '3. Deploy to AKS'
  dependsOn:
    - Build
    - Traefik
  condition: and(
    succeeded('Build'),
    in(dependencies.Traefik.result, 'Succeeded', 'Skipped')
    )
  variables:
    finalLlmAdapterTag: $[ stageDependencies.Build.ResolveFinalTags.outputs['setFinalTags.finalLlmAdapterTag'] ]
    finalSentimentApiTag: $[ stageDependencies.Build.ResolveFinalTags.outputs['setFinalTags.finalSentimentApiTag'] ]
  jobs:
  - deployment: Deploy
    variables:
      imageTag: $(Build.BuildId)
    displayName: 'Deploy'
    environment: '$(environment)'
    strategy:
      runOnce:
        deploy:
          steps:          
          - checkout: self
            clean: true

          - script: |
              echo "Replacing namespace placeholder: $(namespace)"
              
              sed -i "s/__NAMESPACE__/$(namespace)/g" k8s/namespace.yml
              
              echo "Updated namespace.yml:"
              cat k8s/namespace.yml
            displayName: 'Replace Namespace'

          - task: Kubernetes@1
            displayName: 'Create $(namespace) Namespace'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'AKS-VSPro-Connection'
              command: 'apply'
              arguments: '-f k8s/namespace.yml'

          - task: KubernetesManifest@1
            displayName: 'Deploy Application'
            inputs:
              action: 'deploy'
              kubernetesServiceConnection: 'AKS-VSPro-Connection'
              namespace: '$(namespace)'
              manifests: |
                k8s/sentiment-configmap.yaml
                k8s/ollama-deployment.yaml                
                k8s/llm-adapter-deployment.yaml
                k8s/sentiment-api-deployment.yaml
                k8s/sentiment-api-ingress.yaml
              containers: |
                $(dockerHubUsername)/llm-adapter:$(finalLlmAdapterTag)
                $(dockerHubUsername)/sentiment-api:$(finalSentimentApiTag)

          - task: Kubernetes@1
            displayName: 'Wait for Ollama Pod'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'AKS-VSPro-Connection'
              command: 'wait'
              arguments: '--for=condition=ready pod -l app=ollama --timeout=300s'
              namespace: '$(namespace)'

          - task: Kubernetes@1
            displayName: 'Pull Ollama Model'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'AKS-VSPro-Connection'
              command: 'exec'
              arguments: 'deploy/ollama -- ollama pull phi3:mini'
              namespace: '$(namespace)'