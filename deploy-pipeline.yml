trigger:
  - none

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerHubUsername: 'p47r1ck75'
  imageTag: '$(Build.BuildId)'
  
  environment: 'dev'
  namespace: '$(environment)'
  model: 'phi3:mini'

stages:
- stage: Build
  displayName: '2. Build & Push Docker Images'
  jobs:
  - job: BuildImages
    steps:

    - script: |
        echo $(dockerHubPassword) | docker login -u $(dockerHubUsername) --password-stdin
      displayName: '🔑 Docker Login to Docker Hub'

    - pwsh: |
        $changes = git diff HEAD~1 HEAD --name-only
        $llmChanged = $changes -match "llm-adapter/"
        $apiChanged = $changes -match "sentiment-api/"
        echo "##vso[task.setvariable variable=llmAdapterChanged]$llmChanged"
        echo "##vso[task.setvariable variable=sentimentApiChanged]$apiChanged"
      displayName: 'Detect file changes'

    - task: Docker@2
      displayName: 'Build & Push llm-adapter'
      condition: eq(variables['llmAdapterChanged'], 'True')
      inputs:
        command: buildAndPush
        repository: '$(dockerHubUsername)/llm-adapter'
        dockerfile: 'llm-adapter/Dockerfile'
        tags: '$(imageTag),latest'

    - task: Docker@2
      displayName: 'Build & Push sentiment-api'
      condition: eq(variables['sentimentApiChanged'], 'True')
      inputs:
        command: buildAndPush
        repository: '$(dockerHubUsername)/sentiment-api'
        dockerfile: 'sentiment-api/Dockerfile'
        tags: '$(imageTag),latest'

- stage: Deploy
  displayName: '3. Deploy to AKS'
  dependsOn: Build
  jobs:
  - deployment: Deploy
    displayName: 'Deploy'
    environment: '$(environment)'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            displayName: 'Download Cluster Artifact'
            inputs:
              buildType: 'specific'
              project: '$(System.TeamProject)'
              pipeline: 'P47K0.sentiment-aks-ollama - Create'
              artifact: 'cluster-data'
              path: '$(Pipeline.Workspace)/cluster-data'

          - task: PowerShell@2
            displayName: 'Read Cluster Data'
            inputs:
              targetType: 'inline'
              script: |
                $aksRgFile = "$(Pipeline.Workspace)/cluster-data/aks-pip-resource-group-name.txt"
                if (Test-Path $aksRgFile) {
                  $aksRg = Get-Content $aksRgFile -Raw
                  $aksRg = $aksRg.Trim()
                  Write-Host "Loaded AKS PIP Resource Group Name: $aksRg"
                  Write-Host "##vso[task.setvariable variable=aksPipResourceGroupName]$aksRg"
                } else {
                  Write-Host "##vso[task.logissue type=error]AKS PIP Resource Group Name file not found!"
                  exit 1
                }
                $pipNameFile = "$(Pipeline.Workspace)/cluster-data/aks-pip-name.txt"
                if (Test-Path $pipNameFile) {
                  $pipName = Get-Content $pipNameFile -Raw
                  $pipName = $pipName.Trim()
                  Write-Host "Loaded AKS PIP Name: $pipName"
                  Write-Host "##vso[task.setvariable variable=aksPipName]$pipName"
                } else {
                  Write-Host "##vso[task.logissue type=error]AKS PIP Name file not found!"
                  exit 1
                }
                $ipFile = "$(Pipeline.Workspace)/cluster-data/aks-public-ip.txt"
                if (Test-Path $ipFile) {
                  $ip = Get-Content $ipFile -Raw
                  $ip = $ip.Trim()
                  Write-Host "Loaded AKS Public IP: $ip"
                  Write-Host "##vso[task.setvariable variable=aksPublicIp]$ip"
                } else {
                  Write-Host "##vso[task.logissue type=error]AKS Public IP file not found!"
                  exit 1
                }

          - checkout: self
            clean: true

          - script: |
              echo "Adding Traefik Helm repository..."
              helm repo add traefik https://traefik.github.io/charts
              helm repo update
              echo "Traefik repo added and updated"
            displayName: 'Add Traefik Helm Repo'

          - script: |
              echo "Replacing placeholder with resource group name: $(aksPipResourceGroupName)"
              
              sed -i "s/__AKS_RESOURCE_GROUP_NAME__/$(aksPipResourceGroupName)/g" k8s/traefik-values.yml
              
              echo "Updated traefik-values.yml:"
              cat k8s/traefik-values.yml
            displayName: 'Traefik replace Resource Group Name'
          - script: |
              echo "Replacing placeholder with pip name: $(aksPipName)"
              
              sed -i "s/__AKS_PIP_NAME__/$(aksPipName)/g" k8s/traefik-values.yml
              
              echo "Updated traefik-values.yml:"
              cat k8s/traefik-values.yml
            displayName: 'Traefik replace AKS PIP Name'
          - script: |
              echo "Replacing placeholder with IP: $(aksPublicIp)"
              
              sed -i "s/__AKS_PUBLIC_IP__/$(aksPublicIp)/g" k8s/traefik-values.yml
              
              echo "Updated traefik-values.yml:"
              cat k8s/traefik-values.yml
            displayName: 'Traefik replace Public IP'

          - task: HelmDeploy@0
            displayName: 'Deploy Traefik'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceConnection: 'AKS-VSPro-Connection'
              namespace: 'ingress'
              command: 'upgrade'
              chartType: 'Name'
              chartName: 'traefik/traefik'
              releaseName: 'traefik'
              arguments: '--install --atomic --create-namespace'

          - script: |
              echo "Replacing namespace placeholder: $(namespace)"
              
              sed -i "s/__NAMESPACE__/$(namespace)/g" k8s/namespace.yml
              
              echo "Updated namespace.yml:"
              cat k8s/namespace.yml
            displayName: 'Replace Namespace'

          - task: Kubernetes@1
            displayName: 'Create $(namespace) Namespace'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'AKS-VSPro-Connection'
              command: 'apply'
              arguments: '-f k8s/namespace.yml'

          - task: KubernetesManifest@1
            displayName: 'Deploy Application'
            inputs:
              action: 'deploy'
              kubernetesServiceConnection: 'AKS-VSPro-Connection'
              namespace: '$(namespace)'
              manifests: 'k8s/*.yaml'
              containers: |
                $(dockerHubUsername)/llm-adapter:$(imageTag)
                $(dockerHubUsername)/sentiment-api:$(imageTag)

          - task: Kubernetes@1
            displayName: 'Wait for Ollama Pod'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'AKS-VSPro-Connection'
              command: 'wait'
              arguments: '--for=condition=ready pod -l app=ollama -n dev --timeout=300s'
              namespace: '$(namespace)'

          - task: Kubernetes@1
            displayName: 'Pull Ollama Model'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'AKS-VSPro-Connection'
              command: 'exec'
              arguments: 'deploy/ollama -- ollama pull phi3:mini'
              namespace: '$(namespace)'