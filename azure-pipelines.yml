trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerHubUsername: 'p47r1ck75'
  imageTag: '$(Build.BuildId)'
  
  environment: 'dev'
  namespace: '$(environment)'
  model: 'phi3:mini'

stages:

- stage: Bootstrap
  displayName: '1. Bootstrap Terraform Backend'
  jobs:
  - job: Bootstrap
    steps:
    - task: Terraform@1
      displayName: 'Terraform Init - Bootstrap'
      inputs:
        provider: 'AzureRM'
        command: 'init'
        workingDirectory: 'terraform-bootstrap'

    - task: Terraform@1
      displayName: 'Terraform Apply - Backend Storage'
      inputs:
        provider: 'AzureRM'
        command: 'apply'
        workingDirectory: 'terraform-bootstrap'
        environmentServiceName: 'VSPro-Azure-Connection'

- stage: Infrastructure
  displayName: '2. Create AKS Infrastructure'
  dependsOn: Bootstrap
  jobs:
  - job: TerraformAKS
    steps:
    - task: Terraform@1
      displayName: 'Terraform Init - Main'
      inputs:
        provider: 'AzureRM'
        command: 'init'
        workingDirectory: 'terraform-prod'

    - task: Terraform@1
      displayName: 'Terraform Apply - AKS + Nodepool + IP'
      inputs:
        provider: 'AzureRM'
        command: 'apply'
        workingDirectory: 'terraform-prod'
        environmentServiceName: 'VSPro-Azure-Connection'
        variables: |
          -var="resource_group_name=$(ResourceGroupName)"
          -var="user_nodepool_enabled=true"

- stage: Build
  displayName: '2. Build & Push Docker Images'
  dependsOn: Infrastructure
  jobs:
  - job: BuildImages
    steps:
    - task: Docker@2
      displayName: 'Build & Push llm-adapter'
      inputs:
        command: buildAndPush
        repository: '$(dockerHubUsername)/llm-adapter'
        dockerfile: 'llm-adapter/Dockerfile'
        tags: '$(imageTag),latest'

    - task: Docker@2
      displayName: 'Build & Push sentiment-api'
      inputs:
        command: buildAndPush
        repository: '$(dockerHubUsername)/sentiment-api'
        dockerfile: 'sentiment-api/Dockerfile'
        tags: '$(imageTag),latest'

- stage: Deploy
  displayName: '3. Deploy to AKS'
  dependsOn: Build
  jobs:
  - deployment: Deploy
    displayName: 'Deploy'
    environment: '$(environment)'
    strategy:
      runOnce:
        deploy:
          steps:

          # === Wait for manual service connection creation ===
          - task: PowerShell@2
            displayName: 'WAIT - Create AKS-VSPro-Connection Now'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "=================================================================="
                Write-Host "IMPORTANT: Please create the 'AKS-VSPro-Connection' now!"
                Write-Host ""
                Write-Host "Go to: Project Settings → Service connections → New service connection"
                Write-Host "Choose: Kubernetes → Azure Subscription"
                Write-Host "Select your VS Pro subscription and the AKS cluster."
                Write-Host "Name it exactly: AKS-VSPro-Connection"
                Write-Host ""
                Write-Host "After you create it, click 'Approve' below to continue."
                Write-Host "=================================================================="
                Write-Host "Waiting 60 seconds for you to create the connection..."
                Start-Sleep -Seconds 60          

          - task: PowerShell@2
            displayName: 'Create Kubernetes Namespaces'
            inputs:
              targetType: 'inline'
              script: |
                kubectl create namespace $(namespace) --dry-run=client -o yaml | kubectl apply -f -
                kubectl create namespace ingress --dry-run=client -o yaml | kubectl apply -f -

          - task: HelmDeploy@0
            displayName: 'Deploy Traefik'
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceConnection: 'AKS-VSPro-Connection'
              namespace: 'ingress'
              command: 'upgrade'
              chartType: 'Name'
              chartName: 'traefik/traefik'
              releaseName: 'traefik'
              valueFile: 'k8s/traefik-values.yaml'
              arguments: '--create-namespace --set service.spec.loadBalancerIP=$(TerraformOutput.traefik_public_ip)'          

          - task: KubernetesManifest@1
            displayName: 'Deploy Application'
            inputs:
              action: 'deploy'
              kubernetesServiceConnection: 'AKS-VSPro-Connection'
              namespace: '$(namespace)'
              manifests: |
                k8s/sentiment-configmap.yaml
                k8s/ollama-deployment.yaml
                k8s/llm-adapter-deployment.yaml
                k8s/sentiment-api-deployment.yaml
                k8s/sentiment-api-service.yaml
                k8s/sentiment-api-ingress.yaml